name: Secure Web Archive

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      urls:
        description: "Comma-separated URLs"
        required: false
        type: string
      urls_file:
        description: "Path to a file in the repository containing one URL per line"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  archive:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Prepare results directory
        run: mkdir -p results

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run archiver
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          MANUAL_URLS: ${{ inputs.urls }}
          INPUT_URLS_FILE: ${{ inputs.urls_file }}
          MAX_URLS: "10"
          MAX_PAGE_MS: "45000"
          MAX_SCREENSHOT_HEIGHT: "15000"
          MAX_SCROLL_STEPS: "10"
          MAX_SCROLL_WAIT_MS: "350"
          FINAL_SETTLE_MS: "700"
          FONTS_TIMEOUT_MS: "3000"
          STABILIZE_LOOPS: "8"
          STABILIZE_WAIT_MS: "300"
        run: node scripts/archive.mjs

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-archive-${{ github.run_id }}
          path: results/
          retention-days: 14
